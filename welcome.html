<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာ ကြိုဆိုခြင်း</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            background: #667eea;
            color: white;
        }
        
        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 ကြိုဆိုပါသည်</h1>
        <p>ဒီတစ်ခါ သင် ရေးသားတဲ့ HTML ဖိုင်ဖြစ်ပါတယ်။ ကျွန်တော် GitHub မှာ အသစ်ဖိုင် ဆောက်လုပ်ပြီးပါပြီ!</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">💻</div>
                <h3>Web Development</h3>
                <p>ကုဒ်ရေးသားခြင်း စတင်လိုက်ပါပြီ</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🚀</div>
                <h3>GitHub မြန်စိတ်</h3>
                <p>Commit လုပ်ပြီးတွေ့ရပါတယ်</p>
            </div>
            <div class="feature">
                <div class="feature-icon">✨</div>
                <h3>ရည်မှန်းချက်</h3>
                <p>လုပ်ဆောင်ချက်တွေ ထည့်သွင်းခြင်း</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <h3>ဒီজိုင်း</h3>
                <p>အလှတွေ ပြုလုပ်ခြင်း</p>
            </div>
        </div>
        
        <button class="btn" onclick="alert('Hello! Welcome to Web Development 🎉')">
            နှိပ်ကြည့်ပါ
        </button>
    </div>
</body>
</html>
