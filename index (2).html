<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Dino Run</title>
    <style>
        /* မျက်နှာပြင်အပြည့်ဖြစ်စေရန် Body ကို ချိန်ညှိခြင်း */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #87ceeb; 
            font-family: 'Courier New', Courier, monospace; 
        }

        /* ဂိမ်းကွင်းကို မျက်နှာပြင်အပြည့်ဖြစ်အောင် လုပ်ခြင်း */
        #game-box {
            position: relative; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #87ceeb 75%, #5d4037 75%);
            overflow: hidden;
        }

        /* တောင်တန်းများ */
        .mountain {
            position: absolute; bottom: 25%; width: 0; height: 0;
            border-left: 100px solid transparent; border-right: 100px solid transparent;
            border-bottom: 150px solid #9e9e9e; z-index: 1;
        }

        /* တိမ်များ */
        .cloud {
            position: absolute; width: 100px; height: 30px;
            background: white; border-radius: 30px; opacity: 0.8; z-index: 1;
            animation: cloudMove 25s linear infinite;
        }
        @keyframes cloudMove { from { left: 105%; } to { left: -15%; } }

        /* မြေပြင် */
        .ground {
            position: absolute; bottom: 0; width: 100%; height: 25%;
            background-color: #795548;
            background-image: radial-gradient(#5d4037 15%, transparent 15%);
            background-size: 30px 30px; z-index: 2;
        }

        /* Dino Character */
        #dino {
            width: 80px; height: 80px; position: absolute; bottom: 25%; left: 10%;
            font-size: 60px; z-index: 5; display: flex; align-items: center; justify-content: center;
        }

        /* Cactus */
        #cactus {
            width: 60px; height: 80px; position: absolute; bottom: 25%; right: -100px;
            font-size: 50px; z-index: 4;
        }

        /* UI Screen - Center Full Screen */
        #ui-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            color: white; display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center;
        }

        #start-btn {
            padding: 15px 40px; font-size: 24px; background: #4CAF50; color: white;
            border: none; border-radius: 8px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 6px #2e7d32; text-transform: uppercase;
        }
        #start-btn:active { box-shadow: none; transform: translateY(6px); }

        #score-board { 
            position: absolute; top: 20px; left: 20px; 
            font-size: 30px; font-weight: bold; color: #333; 
            z-index: 8; background: rgba(255,255,255,0.7); 
            padding: 10px 25px; border-radius: 10px; 
        }

        .jump { animation: jump-anim 0.6s ease-out; }
        @keyframes jump-anim { 0%, 100% { bottom: 25%; } 50% { bottom: 60%; } }
    </style>
</head>
<body onkeydown="if(event.code==='Space') jump()" onclick="jump()">

    <div id="game-box">
        <div id="score-board">Score: 0</div>
        
        <div id="ui-screen">
            <h1 id="title" style="font-size: 50px;">PIXEL DINO RUN</h1>
            <p style="font-size: 20px;">Space Key (သို့မဟုတ်) Screen ကိုနှိပ်၍ ခုန်ပါ</p>
            <button id="start-btn" onclick="startGame(event)">START GAME</button>
        </div>

        <div class="mountain" style="left: 20%; bottom: 25%;"></div>
        <div class="mountain" style="left: 60%; bottom: 25%; transform: scale(1.5);"></div>
        <div class="cloud" style="top: 10%; animation-duration: 30s;"></div>
        <div class="cloud" style="top: 25%; left: 30%; animation-duration: 40s;"></div>
        <div class="cloud" style="top: 15%; left: 70%; animation-duration: 35s;"></div>
        
        <div class="ground"></div>
        <div id="dino">🦖</div>
        <div id="cactus">🌵</div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreBoard = document.getElementById("score-board");
        const uiScreen = document.getElementById("ui-screen");
        const title = document.getElementById("title");
        
        let score = 0;
        let gameActive = false;
        let gameLoop;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.value = freq;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startGame(e) {
            e.stopPropagation();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameActive = true;
            score = 0;
            scoreBoard.innerText = "Score: 0";
            uiScreen.style.display = "none";
            cactus.style.right = "-100px";
            
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 10);
        }

        function jump() {
            if (gameActive && !dino.classList.contains("jump")) {
                dino.classList.add("jump");
                playTone(500, 0.1);
                setTimeout(() => dino.classList.remove("jump"), 600);
            }
        }

        function update() {
            let dTop = dino.getBoundingClientRect().top;
            let cLeft = cactus.getBoundingClientRect().left;
            let cRight = parseInt(window.getComputedStyle(cactus).getPropertyValue("right"));

            // အတားအဆီး ရွှေ့လျားခြင်း (မျက်နှာပြင်အပြည့်အတွက် အရှိန်ချိန်ခြင်း)
            if (cLeft < -100) {
                cactus.style.right = "-100px";
                score++;
                scoreBoard.innerText = "Score: " + score;
                playTone(800, 0.05);
            } else {
                // အမှတ်တက်လာသည်နှင့်အမျှ ပိုမြန်လာမည်
                let speed = 8 + (score / 5);
                cactus.style.right = (cRight + speed) + "px";
            }

            // တိုက်မိခြင်း စစ်ဆေးခြင်း
            let dRect = dino.getBoundingClientRect();
            let cRect = cactus.getBoundingClientRect();

            if (
                dRect.right > cRect.left + 20 && 
                dRect.left < cRect.right - 20 && 
                dRect.bottom > cRect.top + 20
            ) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            playTone(150, 0.5);
            uiScreen.style.display = "flex";
            title.innerText = "GAME OVER!";
            document.getElementById("start-btn").innerText = "RETRY";
        }
    </script>
</body>
</html>
